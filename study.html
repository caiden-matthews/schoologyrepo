<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Study">
  <title>Study</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #191919;
      --bg2: #111111;
      --card: #242424;
      --card-hover: #2a2a2a;
      --border: rgba(255,255,255,0.07);
      --text: #e8e8e8;
      --subtext: rgba(232,232,232,0.42);
      --accent: #818CF8;
      --accent-dim: rgba(129,140,248,0.13);
      --nav-h: 58px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      color: var(--text);
      overflow: hidden;
    }
    body {
      background: var(--bg);
    }

    /* ── APP SHELL ── */
    #app { height: 100vh; display: flex; flex-direction: column; }
    #content {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 20px);
      -webkit-overflow-scrolling: touch;
    }

    /* ── GLASS CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      margin: 0 16px 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.35);
    }
    .card-sm { padding: 10px 14px; }

    /* ── NAV (text-only, no emojis) ── */
    #nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: calc(var(--nav-h) + var(--safe-bottom));
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex; align-items: flex-start; padding-top: 8px;
      padding-bottom: var(--safe-bottom); z-index: 200;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 5px; cursor: pointer; border: none; background: none; padding: 4px 0;
      transition: opacity 0.15s;
    }
    .nav-btn:active { opacity: 0.55; }
    .nav-label { font-size: 12px; font-weight: 600; color: var(--subtext); transition: color 0.15s; letter-spacing: 0.2px; }
    .nav-btn.active .nav-label { color: var(--accent); font-weight: 800; }
    .nav-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); opacity: 0; transition: opacity 0.15s; }
    .nav-btn.active .nav-dot { opacity: 1; }

    /* ── TABS ── */
    .tab { display: none; }
    .tab.active { display: block; }

    /* ── PAGE HEADER ── */
    .page-header { padding: 52px 16px 10px; display: flex; align-items: flex-start; justify-content: space-between; }
    .page-title { font-size: 30px; font-weight: 800; letter-spacing: -0.7px; }
    .page-sub   { font-size: 13px; color: var(--subtext); margin-top: 3px; }

    /* ── NOTIF BUTTON (no emoji) ── */
    .sync-btn {
      height: 30px; padding: 0 12px; border-radius: 6px;
      background: var(--card); border: 1px solid var(--border);
      color: var(--subtext); font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; cursor: pointer; flex-shrink: 0; margin-top: 54px;
      transition: background 0.12s, color 0.12s;
      display: flex; align-items: center; gap: 5px;
    }
    .sync-btn:active { opacity: 0.7; }
    .sync-btn.syncing { color: var(--accent); border-color: var(--accent); }
    .sync-btn.ok     { color: #4ADE80; border-color: #4ADE80; }
    .sync-btn.err    { color: #F87171; border-color: #F87171; }
    .sync-spinner { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      border: 1.5px solid currentColor; border-top-color: transparent;
      animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 11px; font-weight: 700; color: var(--subtext);
      text-transform: uppercase; letter-spacing: 1px;
      padding: 0 16px; margin-bottom: 6px; margin-top: 20px;
    }

    /* ── CHIPS ── */
    .chip {
      display: inline-flex; align-items: center; padding: 2px 8px;
      border-radius: 20px; font-size: 10px; font-weight: 700; color: white;
      cursor: pointer; user-select: none;
      transition: filter 0.15s, transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
    }
    .chip:active { transform: scale(0.88); filter: brightness(1.15); }

    /* ── BADGES ── */
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; }
    .badge-red   { background: rgba(239,68,68,0.18);  color: #FCA5A5; }
    .badge-green { background: rgba(74,222,128,0.15); color: #86EFAC; }
    .badge-gray  { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
    .badge-major { background: rgba(167,139,250,0.2); color: #C4B5FD; }
    .timer-badge {
      background: rgba(129,140,248,0.15); color: #A5B4FC;
      cursor: pointer; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
      transition: background 0.15s, transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
    }
    .timer-badge:active { background: rgba(129,140,248,0.32); transform: scale(0.9); }

    /* ── SCHOOLOGY LINK ── */
    .schoology-btn {
      display: inline-block; font-size: 10px; font-weight: 700;
      color: var(--accent); text-decoration: none;
      padding: 2px 8px; border-radius: 6px;
      background: var(--accent-dim);
      transition: background 0.15s, transform 0.12s;
    }
    .schoology-btn:active { background: rgba(129,140,248,0.28); transform: scale(0.95); }

    /* ── FOCUS CARD ── */
    .focus-card {
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      border-radius: 12px; padding: 18px; margin: 12px 16px 10px; color: white;
      box-shadow: 0 4px 20px rgba(79,70,229,0.35);
      border: none;
    }
    .focus-label    { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; opacity: 0.7; }
    .focus-title    { font-size: 20px; font-weight: 800; margin-top: 5px; line-height: 1.2; letter-spacing: -0.3px; }
    .focus-sub      { font-size: 12px; opacity: 0.82; margin-top: 6px; line-height: 1.5; }
    .focus-duration {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.18); border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.16);
      padding: 5px 12px; font-size: 11px; font-weight: 700; margin-top: 12px;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
    }
    .focus-duration:active { background: rgba(255,255,255,0.3); transform: scale(0.96); }

    /* ── ALERTS ── */
    .alert-banner {
      margin: 0 16px 10px; border-radius: 14px; padding: 11px 13px;
      display: flex; gap: 10px; align-items: flex-start;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .alert-banner.red   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.2); border-left: 3px solid #EF4444; }
    .alert-banner.amber { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.16); border-left: 3px solid #F59E0B; }
    .alert-banner.dismissing { opacity: 0; transform: translateX(12px); pointer-events: none; }
    .alert-text    { font-size: 13px; font-weight: 500; line-height: 1.45; flex: 1; }
    .alert-text b  { font-weight: 700; }
    .alert-dismiss { font-size: 14px; color: var(--subtext); cursor: pointer; flex-shrink: 0; line-height: 1.4; transition: color 0.15s; padding: 0 2px; }
    .alert-dismiss:active { color: var(--text); }

    /* ── TWO-COLUMN TODAY ── */
    .two-col-headers {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; padding: 0 16px; margin-bottom: 6px; margin-top: 20px;
    }
    .col-header-label { font-size: 11px; font-weight: 700; color: var(--subtext); text-transform: uppercase; letter-spacing: 1px; }
    .two-col-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; padding: 0 16px; align-items: start;
    }
    .col-panel { display: flex; flex-direction: column; gap: 8px; }
    .col-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid;
      border-radius: 8px; padding: 10px 11px;
      cursor: pointer; position: relative;
      transition: background 0.12s;
    }
    .col-item:active { background: var(--card-hover); }
    @media (hover: hover) { .col-item:hover { background: var(--card-hover); } }
    .col-item-title  { font-size: 12px; font-weight: 700; line-height: 1.3; }
    .col-item-time   { font-size: 10px; color: var(--subtext); margin-top: 2px; font-weight: 600; }
    .col-item-footer { display: flex; align-items: center; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
    .col-item-now    { border-color: var(--accent) !important; background: rgba(99,102,241,0.12) !important; }
    .col-item-now .col-item-title { color: #C4B5FD; }

    /* ── TIME LINE ── */
    .time-now-line { display: flex; align-items: center; gap: 8px; pointer-events: none; margin: -2px 0 2px; }
    .time-now-dot  { width: 7px; height: 7px; border-radius: 50%; background: #F87171; flex-shrink: 0; box-shadow: 0 0 6px rgba(248,113,113,0.5); }
    .time-now-bar  { flex: 1; height: 1.5px; background: #F87171; border-radius: 1px; opacity: 0.65; }
    .time-now-label { font-size: 9px; font-weight: 700; color: #F87171; white-space: nowrap; flex-shrink: 0; }

    /* ── WEEK VIEW ── */
    .week-scroll { overflow-x: auto; padding: 0 16px 8px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .week-scroll::-webkit-scrollbar { display: none; }
    .week-row { display: flex; gap: 8px; min-width: max-content; }

    .day-col {
      width: 92px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 7px 8px;
      display: flex; flex-direction: column; position: relative;
    }
    .day-col.today { border-color: rgba(129,140,248,0.4); background: rgba(99,102,241,0.07); }
    .day-header { text-align: center; margin-bottom: 8px; }
    .day-name   { font-size: 10px; font-weight: 700; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.5px; }
    .day-num    { font-size: 20px; font-weight: 800; color: var(--text); line-height: 1.2; }
    .day-col.today .day-name { color: var(--accent); }
    .today-num-circle {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--accent); color: white;
      font-size: 14px; font-weight: 800;
    }

    .day-section-label {
      font-size: 8px; font-weight: 800; color: var(--subtext);
      text-transform: uppercase; letter-spacing: 0.8px; margin: 4px 0 4px;
    }
    .day-divider { height: 1px; background: var(--border); margin: 5px 0; }

    .day-item {
      background: rgba(255,255,255,0.05);
      border-radius: 6px; padding: 6px 7px; margin-bottom: 5px; position: relative;
      border-left: 2px solid;
      font-size: 10px; font-weight: 600; line-height: 1.3;
      cursor: pointer;
      transition: background 0.15s, transform 0.12s cubic-bezier(0.34,1.56,0.64,1);
    }
    .day-item:active { transform: scale(0.93); background: rgba(255,255,255,0.12); }
    .day-item:last-child { margin-bottom: 0; }
    .day-item-time  { font-size: 9px; color: var(--subtext); margin-top: 1px; font-weight: 500; }
    .day-study-item { background: rgba(129,140,248,0.1); border-left-color: var(--accent) !important; color: #C4B5FD; }

    /* ── GRADE CARDS ── */
    .grade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px; }
    .grade-card {
      background: var(--card);
      border: 1px solid var(--border); border-radius: 10px; padding: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.35);
      cursor: pointer; position: relative; overflow: hidden;
      transition: background 0.12s;
    }
    .grade-card:active { background: var(--card-hover); }
    @media (hover: hover) { .grade-card:hover { background: var(--card-hover); } }
    .grade-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .grade-subject { font-size: 10px; font-weight: 700; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.4px; }
    .grade-value   { font-size: 28px; font-weight: 900; margin-top: 3px; letter-spacing: -1.5px; }
    .grade-pct     { font-size: 11px; color: var(--subtext); font-weight: 500; }
    .grade-alert   { font-size: 10px; color: #FCA5A5; margin-top: 5px; line-height: 1.35; font-weight: 600; }
    .grade-ok      { font-size: 10px; color: #86EFAC; margin-top: 5px; font-weight: 600; }
    .grade-hint    { font-size: 9px; color: rgba(255,255,255,0.18); margin-top: 7px; }

    /* ── CATCH-UP ── */
    .catchup-item {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 11px 8px; margin: 0 -8px; border-bottom: 1px solid var(--border);
      border-radius: 10px; cursor: pointer;
      transition: background 0.15s, transform 0.12s;
    }
    .catchup-item:last-child { border-bottom: none; }
    .catchup-item:active { background: rgba(255,255,255,0.06); transform: scale(0.99); }
    .catchup-icon  { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; flex-shrink: 0; }
    .catchup-title { font-size: 13px; font-weight: 700; }
    .catchup-meta  { font-size: 11px; color: var(--subtext); margin-top: 2px; }
    .catchup-note  { font-size: 12px; color: var(--subtext); margin-top: 4px; line-height: 1.45; }

    /* ── STUDY PLAN ── */
    .plan-header  { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .plan-title   { font-size: 14px; font-weight: 800; }
    .plan-due     { font-size: 11px; color: var(--subtext); margin-left: auto; font-weight: 500; }
    .plan-warning { font-size: 12px; color: #FCD34D; font-weight: 600; padding: 8px 11px; background: rgba(251,191,36,0.08); border-radius: 10px; margin-bottom: 8px; border: 1px solid rgba(251,191,36,0.16); }
    .session-row  { display: flex; gap: 10px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .session-row:last-child { border-bottom: none; }
    .session-day  { font-size: 11px; font-weight: 700; min-width: 44px; color: var(--subtext); }
    .session-day.today { color: var(--accent); }
    .session-bar  { flex: 1; background: rgba(255,255,255,0.04); border-radius: 6px; padding: 7px 10px; border: 1px solid var(--border); }
    .session-text { font-size: 12px; font-weight: 500; }
    .divider      { height: 1px; background: var(--border); margin: 8px 0; }

    /* ── TAB PILLS ── */
    .tab-pills { display: flex; gap: 8px; padding: 8px 16px 0; }
    .tab-pill {
      padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--card); color: var(--subtext);
      transition: background 0.12s, color 0.12s;
    }
    .tab-pill:active { opacity: 0.8; }
    .tab-pill.active { background: var(--accent); color: white; border-color: transparent; }

    /* ── UPCOMING LIST ── */
    .upcoming-item {
      display: flex; align-items: center; gap: 12px; padding: 11px 16px;
      border-radius: 12px; cursor: pointer;
      transition: background 0.15s, transform 0.12s;
    }
    .upcoming-item:active { background: rgba(255,255,255,0.07); transform: scale(0.99); }
    @media (hover: hover) { .upcoming-item:hover { background: rgba(255,255,255,0.04); border-radius: 8px; } }

    /* ── DUE ITEMS ── */
    .due-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity 0.15s; }
    .due-item:last-child { border-bottom: none; }
    .due-item:active { opacity: 0.6; }

    /* ── CAL NOTE ── */
    .cal-note { margin: 0 16px 10px; background: rgba(129,140,248,0.08); border-radius: 12px; padding: 9px 13px; font-size: 12px; color: #A5B4FC; font-weight: 600; border: 1px solid rgba(129,140,248,0.18); display: none; }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 32px 20px; color: var(--subtext); }
    .empty-text { font-size: 14px; font-weight: 500; }

    /* ══════════ MODALS ══════════ */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: var(--safe-bottom);
      opacity: 0; pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-sheet {
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-top: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px 16px 0 0;
      width: 100%; max-height: 84vh;
      overflow-y: auto; padding: 18px 20px 36px;
      box-shadow: 0 -8px 48px rgba(0,0,0,0.4);
      transform: translateY(100%);
      transition: transform 0.38s cubic-bezier(0.32,0.72,0,1);
      overscroll-behavior: contain;
    }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }
    .modal-handle { width: 34px; height: 4px; background: rgba(255,255,255,0.18); border-radius: 2px; margin: 0 auto 16px; }
    .modal-title  { font-size: 19px; font-weight: 800; letter-spacing: -0.4px; }
    .modal-close  { font-size: 13px; font-weight: 700; color: var(--accent); cursor: pointer; padding: 4px 8px; transition: opacity 0.15s; }
    .modal-close:active { opacity: 0.6; }
    .modal-sec-label { font-size: 11px; font-weight: 700; color: var(--subtext); text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 8px; }
    .modal-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
    .modal-item:last-child { border-bottom: none; }
    .modal-item-title { font-size: 14px; font-weight: 700; }
    .modal-item-sub { font-size: 12px; color: var(--subtext); margin-top: 3px; line-height: 1.45; }

    /* ── TIMER MODAL ── */
    #timerModal {
      position: fixed; inset: 0; z-index: 600;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    #timerModal.open { opacity: 1; pointer-events: all; }
    .timer-card {
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 16px; padding: 28px 26px 24px;
      width: calc(100% - 48px); max-width: 320px;
      box-shadow: 0 24px 72px rgba(0,0,0,0.5);
      text-align: center;
      transform: scale(0.88) translateY(14px);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    #timerModal.open .timer-card { transform: scale(1) translateY(0); }
    .timer-label    { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--subtext); margin-bottom: 14px; }
    .timer-ring-wrap { position: relative; width: 170px; height: 170px; margin: 0 auto 18px; }
    #timerCanvas    { position: absolute; top: 0; left: 0; width: 170px; height: 170px; }
    .timer-display  { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .timer-time     { font-size: 42px; font-weight: 900; letter-spacing: -2px; color: var(--text); }
    .timer-sub      { font-size: 10px; color: var(--subtext); font-weight: 700; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
    .timer-btns     { display: flex; gap: 9px; }
    .timer-btn {
      flex: 1; padding: 13px; border-radius: 14px; font-size: 13px; font-weight: 700;
      border: none; cursor: pointer;
      transition: opacity 0.15s, transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
    }
    .timer-btn:active { opacity: 0.7; transform: scale(0.93); }
    .timer-btn-primary   { background: var(--accent); color: white; }
    .timer-btn-secondary { background: rgba(255,255,255,0.09); color: var(--text); border: 1px solid var(--border); }
    .timer-btn-close     { background: rgba(255,255,255,0.06); color: var(--subtext); flex: 0.55; border: 1px solid var(--border); }

    /* ── ADD EVENT BUTTON ── */
    .add-event-btn {
      font-size: 12px; font-weight: 600; color: var(--accent);
      background: var(--accent-dim); border: 1px solid rgba(129,140,248,0.18);
      border-radius: 6px; padding: 5px 12px; cursor: pointer;
      transition: background 0.12s;
    }
    .add-event-btn:active { opacity: 0.7; }

    /* ── FORM ELEMENTS ── */
    .form-label { font-size: 11px; font-weight: 700; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
    .form-input {
      width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);

// ============================================================
// OAUTH & AUTHENTICATION
// ============================================================

/**
 * Check if user is authenticated by looking for tokens in localStorage
 */
function isAuthenticated() {
  const token = localStorage.getItem('sc_at');
  return !!token;
}

/**
 * Handle OAuth callback: extract tokens from hash and store in localStorage
 */
function handleOAuthCallback() {
  const hash = new URLSearchParams(window.location.hash.slice(1));

  // Check for tokens in hash
  if (hash.has('sc_at')) {
    const accessToken = hash.get('sc_at');
    const accessSecret = hash.get('sc_ats');
    const school = hash.get('sc_school');
    const userName = hash.get('sc_user');

    // Store tokens in localStorage (persistent across page refresh)
    localStorage.setItem('sc_at', accessToken);
    localStorage.setItem('sc_ats', accessSecret);
    if (school) localStorage.setItem('sc_school', school);
    if (userName) localStorage.setItem('sc_user', userName);

    // Clean hash from URL (prevents hash from staying in browser history)
    window.history.replaceState({}, document.title, window.location.pathname);

    // Trigger auto-sync
    syncData();

    return true;
  }

  // Check for OAuth errors
  if (hash.has('oauth_error')) {
    const errorMsg = hash.get('oauth_error');
    // OAuth errors require starting the flow over from landing page, so no inline retry
    showErrorBanner(errorMsg || 'Authorization failed. Please try again.', false);

    // Clean hash from URL
    window.history.replaceState({}, document.title, window.location.pathname);

    return false;
  }

  return false;
}

/**
 * Show landing page (hide app)
 */
function showLandingPage() {
  const app = document.getElementById('app');
  if (app) {
    app.style.display = 'none';
  }

  // Redirect to index.html if it exists, else show a message
  if (document.location.pathname !== '/') {
    window.location.href = '/';
  }
}

/**
 * Show app (hide landing page)
 */
function showApp() {
  const app = document.getElementById('app');
  if (app) {
    app.style.display = 'flex';
  }
}

/**
 * Logout: clear tokens and return to landing page
 */
function logout() {
  localStorage.removeItem('sc_at');
  localStorage.removeItem('sc_ats');
  localStorage.removeItem('sc_school');
  localStorage.removeItem('sc_user');
  localStorage.removeItem('lastSyncTime');

  // Redirect to landing page
  window.location.href = '/';
}

/**
 * Show error banner in the app
 */
function showErrorBanner(message, allowRetry = true) {
  // Create a simple alert banner if one doesn't exist
  let banner = document.getElementById('error-banner');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'error-banner';
    banner.style.cssText = `
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(239,68,68,0.1); border-bottom: 1px solid rgba(239,68,68,0.2);
      padding: 12px 16px; color: #FCA5A5; font-size: 13px;
      text-align: center; display: flex; align-items: center; justify-content: space-between;
      gap: 10px;
    `;
    const textContainer = document.createElement('div');
    textContainer.style.cssText = 'flex: 1; text-align: left;';
    banner.appendChild(textContainer);
    const btnContainer = document.createElement('div');
    btnContainer.style.cssText = 'display: flex; gap: 8px; flex-shrink: 0; align-items: center;';
    banner.appendChild(btnContainer);
    document.body.insertBefore(banner, document.body.firstChild);
  }

  const textContainer = banner.children[0];
  const btnContainer = banner.children[1];

  textContainer.textContent = message;
  btnContainer.innerHTML = '';

  if (allowRetry) {
    const retryBtn = document.createElement('button');
    retryBtn.textContent = 'Retry';
    retryBtn.style.cssText = `
      background: rgba(129,140,248,0.2); border: 1px solid rgba(129,140,248,0.4);
      color: #A5B4FC; padding: 6px 12px; border-radius: 6px; font-size: 12px;
      font-weight: 600; cursor: pointer; transition: background 0.2s;
    `;
    retryBtn.onmouseover = () => retryBtn.style.background = 'rgba(129,140,248,0.3)';
    retryBtn.onmouseout = () => retryBtn.style.background = 'rgba(129,140,248,0.2)';
    retryBtn.onclick = () => { banner.remove(); syncData(); };
    btnContainer.appendChild(retryBtn);
  }

  const closeBtn = document.createElement('button');
  closeBtn.innerHTML = '✕';
  closeBtn.style.cssText = 'background: none; border: none; color: #FCA5A5; cursor: pointer; font-size: 16px; padding: 0 8px;';
  closeBtn.onclick = () => banner.remove();
  btnContainer.appendChild(closeBtn);

  banner.style.display = 'flex';

  // Auto-hide after 6 seconds
  clearTimeout(banner._timeout);
  banner._timeout = setTimeout(() => {
    if (banner && banner.parentNode) {
      banner.remove();
    }
  }, 6000);
}

/**
 * Sync data from Schoology API
 */
async function syncData() {
  const accessToken = localStorage.getItem('sc_at');
  const accessSecret = localStorage.getItem('sc_ats');
  const school = localStorage.getItem('sc_school');

  if (!accessToken || !accessSecret) {
    console.warn('No tokens for sync');
    return;
  }

  const syncBtn = document.getElementById('syncBtn');
  const syncLabel = document.getElementById('syncLabel');
  const syncSpinner = document.getElementById('syncSpinner');

  // Show loading state
  if (syncBtn) {
    syncBtn.disabled = true;
    syncBtn.classList.add('syncing');
    if (syncLabel) syncLabel.textContent = 'Syncing...';
    if (syncSpinner) syncSpinner.style.display = 'inline-block';
  }

  try {
    const response = await fetch('/api/sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        access_token: accessToken,
        access_token_secret: accessSecret,
        school: school || 'schoology.com',
      }),
    });

    const result = await response.json();

    if (result.ok && result.data) {
      // Update DATA with fetched data
      // The response contains: { today, week, alerts, lastUpdated, user }
      if (result.data.today) {
        DATA.today = result.data.today;
      }
      if (result.data.week) {
        DATA.week = result.data.week;
      }
      if (result.data.alerts) {
        DATA.alerts = result.data.alerts;
      }
      if (result.data.lastUpdated) {
        DATA.meta.lastUpdated = result.data.lastUpdated;
      }
      if (result.data.user) {
        DATA.profile.name = result.data.user;
        localStorage.setItem('sc_user', result.data.user);
      }

      // Store last sync time
      localStorage.setItem('lastSyncTime', Date.now().toString());

      // Re-render UI
      renderToday();
      renderWeek();
      renderPlan();
      renderGrades();

      // Show success state
      if (syncBtn) {
        syncBtn.classList.remove('syncing');
        syncBtn.classList.add('ok');
        if (syncLabel) syncLabel.textContent = 'Synced';
      }

      setTimeout(() => {
        if (syncBtn) {
          syncBtn.disabled = false;
          syncBtn.classList.remove('ok');
          if (syncLabel) syncLabel.textContent = 'Sync';
        }
      }, 1500);
    } else {
      // Error response
      const errorMsg = result.error || 'Failed to sync data.';
      showErrorBanner(errorMsg);

      // Show error state
      if (syncBtn) {
        syncBtn.classList.remove('syncing');
        syncBtn.classList.add('err');
      }

      setTimeout(() => {
        if (syncBtn) {
          syncBtn.disabled = false;
          syncBtn.classList.remove('err');
          if (syncLabel) syncLabel.textContent = 'Sync';
        }
      }, 1500);
    }
  } catch (error) {
    console.error('Sync error:', error);
    showErrorBanner('Failed to sync. Check your internet connection.');

    if (syncBtn) {
      syncBtn.disabled = false;
      syncBtn.classList.remove('syncing');
      if (syncLabel) syncLabel.textContent = 'Sync';
      if (syncSpinner) syncSpinner.style.display = 'none';
    }
  }
}

/**

function initAuth() {
  // First, handle OAuth callback (if tokens are in hash)
  handleOAuthCallback();

  // Then check if user is authenticated
  if (isAuthenticated()) {
    // User is logged in — show app
    showApp();

    // Update greeting with user's name if available
    const userName = localStorage.getItem('sc_user');
    const greeting = document.getElementById('greeting');
    if (greeting && userName) {
      greeting.textContent = `Hey, ${userName}`;
    }

    // Add logout button if not already present
    addLogoutButton();

    // User is not logged in — redirect to landing page
    showLandingPage();
  }
}

let _dc = 0;
function reg(title, html) {
  const id = 'd' + (_dc++);
  DETAILS[id] = { title, html };
  return id;

// ============================================================
// TIMER
// ============================================================
const tmr = { rem:0, total:0, running:false, iv:null };

function openTimer(minutes, label) {
  clearInterval(tmr.iv);
  tmr.total = minutes * 60; tmr.rem = tmr.total; tmr.running = false;
  document.getElementById('timerLabel').textContent = label || (minutes + ' min');
  document.getElementById('timerStartBtn').textContent = 'Start';
  document.getElementById('timerSubLabel').textContent = 'tap start';
  document.getElementById('timerModal').classList.add('open');
  drawTimer();
}

function drawTimer() {
  const canvas = document.getElementById('timerCanvas');
  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  const sz = 170;
  if (canvas.width !== sz * dpr) { canvas.width = sz * dpr; canvas.height = sz * dpr; }
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, sz, sz);
  const cx = sz/2, cy = sz/2, r = 72;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=10; ctx.stroke();
  const pct = tmr.total > 0 ? tmr.rem / tmr.total : 0;
  if (pct > 0 || tmr.rem === 0 && tmr.total > 0) {
    ctx.beginPath();
    ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+(tmr.rem===0?1:pct)*Math.PI*2);
    ctx.strokeStyle = tmr.rem === 0 ? '#4ADE80' : '#818CF8';
    ctx.lineWidth=10; ctx.lineCap='round'; ctx.stroke();
  }
  const m = Math.floor(tmr.rem/60), s = tmr.rem%60;
  document.getElementById('timerDisplay').textContent =
    String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function timerToggle() {
  if (tmr.running) {
    clearInterval(tmr.iv); tmr.running=false;
    document.getElementById('timerStartBtn').textContent='Resume';
    document.getElementById('timerSubLabel').textContent='paused';
  } else {
    if (tmr.rem===0) { timerReset(); return; }
    tmr.iv = setInterval(()=>{
      tmr.rem = Math.max(0,tmr.rem-1); drawTimer();
      document.getElementById('timerSubLabel').textContent = tmr.rem>0?'focus time':'done!';
      if (tmr.rem===0) {
        clearInterval(tmr.iv); tmr.running=false;
        document.getElementById('timerStartBtn').textContent='Start';
        if (navigator.vibrate) navigator.vibrate([200,100,200,100,400]);
      }
    },1000);
    tmr.running=true;
    document.getElementById('timerStartBtn').textContent='Pause';
    document.getElementById('timerSubLabel').textContent='focus time';
  }
}

function timerReset() {
  clearInterval(tmr.iv); tmr.running=false; tmr.rem=tmr.total;
  document.getElementById('timerStartBtn').textContent='Start';
  document.getElementById('timerSubLabel').textContent='tap start';
  drawTimer();
}

function closeTimer() {
  clearInterval(tmr.iv); tmr.running=false;

function filterSubject(subject) {
  const s = DATA.subjects[subject];
  if (!s) return;
  const color = s.color;
  document.getElementById('filterHeader').innerHTML =
    `<span style="display:inline-flex;align-items:center;padding:5px 14px;border-radius:20px;font-size:14px;font-weight:800;color:white;background:${color}">${subject} — ${s.full}</span>`;

  let html = '';

  const todayItems = DATA.today.agenda.filter(a => a.subject===subject);
  if (todayItems.length) {
    html += `<div class="modal-sec-label">Tonight</div>`;
    todayItems.forEach(a => {
      html += `<div class="modal-item"><div class="modal-item-title">${a.title}</div>
        <div class="modal-item-sub">${a.start} · ${a.duration} · ${a.note}</div>
        ${schoologyBtn(a.schoologyUrl)}</div>`;
    });
  }

  const weekItems = [];
  DATA.week.forEach(day => day.items.filter(i=>i.subject===subject).forEach(i=>weekItems.push({...i,date:day.date,dayLabel:day.label})));
  if (weekItems.length) {
    html += `<div class="modal-sec-label">This Week</div>`;
    weekItems.forEach(i => {
      const ds = new Date(i.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      html += `<div class="modal-item"><div class="modal-item-title">${i.label}</div>
        <div class="modal-item-sub">${ds} at ${i.time}${i.study?' · study session':''}</div>
        ${schoologyBtn(i.schoologyUrl)}</div>`;
    });
  }

  const planItems = DATA.studyPlan.filter(p=>p.subject===subject);
  if (planItems.length) {
    html += `<div class="modal-sec-label">Study Plan</div>`;
    planItems.forEach(p => {
      html += `<div class="modal-item"><div class="modal-item-title">${p.title}
        <span style="font-size:10px;color:${p.weight==='MAJOR'?'#C4B5FD':'rgba(255,255,255,0.4)'};font-weight:700;margin-left:4px">${p.weight}</span></div>
        <div class="modal-item-sub">Due: ${p.due}</div>`;
      p.sessions.forEach(s=>{html+=`<div style="font-size:11px;color:var(--subtext);padding:3px 0 0 8px">· ${s.day} ${s.date}: ${s.focus} (${s.duration})</div>`;});
      html += schoologyBtn(p.schoologyUrl) + `</div>`;
    });
  }

  const catchItems = DATA.catchup.filter(c=>c.subject===subject);
  if (catchItems.length) {
    html += `<div class="modal-sec-label">Catch-up</div>`;
    catchItems.forEach(c => {
      html += `<div class="modal-item"><div class="modal-item-title">${c.title}</div>
        <div class="modal-item-sub">Was due ${c.dueDate} — ${c.note}</div>
        ${schoologyBtn(c.schoologyUrl)}</div>`;
    });
  }

  const grade = DATA.grades.find(g=>g.short===subject);
  if (grade) {
    html += `<div class="modal-sec-label">Grade</div>
      <div class="modal-item">
        <div style="font-size:24px;font-weight:900;color:${color}">${grade.letter}
          <span style="font-size:14px;color:var(--subtext);font-weight:500">${grade.grade}</span></div>
        <div class="modal-item-sub">${grade.alert ? grade.alert : grade.ok || ''}</div>
      </div>`;
  }

  if (!html) html = `<div class="empty"><div class="empty-text">No items for this subject.</div></div>`;
  document.getElementById('filterContent').innerHTML = html;
  openModal('filterModal');
}

function openGradeDetail(idx) {
  const g = DATA.grades[idx];
  const color = subjectColor(g.short);
  let html = `<div style="text-align:center;padding:10px 0 18px">
    <div style="font-size:50px;font-weight:900;color:${color};letter-spacing:-3px">${g.letter}</div>
    <div style="font-size:17px;font-weight:700;color:${color};margin-top:-4px">${g.grade}</div>
    <div style="font-size:13px;color:var(--subtext);margin-top:4px">${g.full}</div>
  </div>`;
  if (g.alert) html += `<div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:12px;padding:11px;margin-bottom:12px;font-size:13px;font-weight:600;color:#FCA5A5">${g.alert}</div>`;
  if (g.ok)    html += `<div style="background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.2);border-radius:12px;padding:11px;margin-bottom:12px;font-size:13px;font-weight:600;color:#86EFAC">${g.ok}</div>`;

  const related = DATA.catchup.filter(c=>g.catchupKeys&&g.catchupKeys.includes(c.subject));
  if (related.length) {
    html += `<div class="modal-sec-label">Needs Attention</div>`;
    related.forEach(c => {
      const col = c.action==='urgent'?'#FCA5A5':c.action==='talk'?'#FCD34D':'var(--subtext)';
      html += `<div class="modal-item"><div class="modal-item-title" style="color:${col}">${c.title}</div>
        <div class="modal-item-sub">Was due ${c.dueDate} — ${c.note}</div>
        ${schoologyBtn(c.schoologyUrl)}</div>`;
    });
  }

  const upcoming = [];
  DATA.week.forEach(day=>day.items.filter(i=>i.subject===g.short&&!i.study).forEach(i=>upcoming.push({...i,date:day.date})));
  if (upcoming.length) {
    html += `<div class="modal-sec-label">Coming Up</div>`;
    upcoming.forEach(i => {
      const ds = new Date(i.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      html += `<div class="modal-item"><div class="modal-item-title">${i.label}</div>
        <div class="modal-item-sub">${ds} at ${i.time}</div>
        ${schoologyBtn(i.schoologyUrl)}</div>`;
    });
  }
  openDetailModal(g.full, html);
}

let _syncTimeout = null;

// ── Schoology OAuth token handling ───────────────────────────────────────────
// After OAuth, Schoology redirects to /#sc_at=TOKEN&sc_ats=SECRET&sc_user=NAME
// We pick those up here, store in localStorage, then clean the URL.
(function handleOAuthCallback() {
  if (!location.hash || location.hash.length < 2) return;
  const params = new URLSearchParams(location.hash.slice(1));
  if (params.get('sc_at')) {
    localStorage.setItem('sc_access_token',        params.get('sc_at'));
    localStorage.setItem('sc_access_token_secret', params.get('sc_ats') || '');
    localStorage.setItem('sc_user',                params.get('sc_user') || '');
    history.replaceState(null, '', location.pathname); // clean URL
  }
  if (params.get('oauth_error')) {
    console.warn('Schoology OAuth error:', params.get('oauth_error'));
    history.replaceState(null, '', location.pathname);
  }
})();

// Helper functions for token access (using updated localStorage keys)
function _scToken()  { return localStorage.getItem('sc_at') || ''; }
function _scSecret() { return localStorage.getItem('sc_ats') || ''; }
function _scUser()   { return localStorage.getItem('sc_user') || ''; }
function _scConnected() { return !!_scToken(); }

// Update Sync button label to reflect connection state
function checkSyncStatus() {
  const lbl = document.getElementById('syncLabel');
  const btn = document.getElementById('syncBtn');
  if (!lbl || !btn) return;
  if (_scConnected()) {
    lbl.textContent = 'Sync';
    btn.title = _scUser() ? `Synced as ${_scUser()}` : 'Sync Schoology';
  } else {
    lbl.textContent = 'Connect';
    btn.title = 'Connect your Schoology account';
  }
}
checkSyncStatus();

// Merge synced Schoology data into the live DATA object and re-render
function mergeSchoologyData(syncedData) {
  if (!syncedData) return;
  const today = syncedData.today;
  const week  = syncedData.week;

  // Today: append synced study items + agenda items (drop old synced ones first)
  if (today && DATA.today) {
    DATA.today.agenda = (DATA.today.agenda || []).filter(a => !a._synced).concat(today.agenda || []);
    DATA.today.study  = (DATA.today.study  || []).filter(s => !s._synced).concat(today.study  || []);
  }

  // Week: for each day, replace synced study items with fresh ones, keep events
  if (week && DATA.week) {
    const byDate = {};
    DATA.week.forEach(d => byDate[d.date] = d);
    week.forEach(sd => {
      if (byDate[sd.date]) {
        byDate[sd.date].study = (byDate[sd.date].study || []).filter(s => !s._synced).concat(sd.study || []);
      } else {
        DATA.week.push(sd);
      }
    });
    DATA.week.sort((a, b) => a.date < b.date ? -1 : 1);
  }

  // Alerts: replace old synced alerts
  DATA.alerts = (DATA.alerts || []).filter(a => !a._synced).concat(syncedData.alerts || []);
  DATA.lastUpdated = syncedData.lastUpdated || new Date().toISOString();

  // Persist merged data to localStorage so it survives page refresh
  try { localStorage.setItem('sc_last_data', JSON.stringify({ today: DATA.today, week: DATA.week, alerts: DATA.alerts, lastUpdated: DATA.lastUpdated })); } catch(_) {}
}

// On page load, restore last synced data so the app feels instant
(function restoreLastSync() {
  try {
    const saved = localStorage.getItem('sc_last_data');
    if (saved) mergeSchoologyData(JSON.parse(saved));
  } catch(_) {}
})();

function runSync() {
  const btn  = document.getElementById('syncBtn');
  const lbl  = document.getElementById('syncLabel');
  const spin = document.getElementById('syncSpinner');
  if (!btn || btn.classList.contains('syncing')) return;

  // Not connected → kick off OAuth flow (same tab so the redirect works cleanly)
  if (!_scConnected()) {
    window.location.href = '/api/auth';
    return;
  }

  btn.className = 'sync-btn syncing';
  spin.style.display = 'inline-block';
  lbl.textContent = 'Syncing';

  fetch('/api/sync', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      access_token: _scToken(),
      access_token_secret: _scSecret(),
      school: localStorage.getItem('sc_school') || 'schoology.com'
    })
  })
  .then(r => r.json())
  .then(resp => {
    spin.style.display = 'none';
    if (resp.ok && resp.data) {
      // Update user name if returned
      if (resp.data.user) localStorage.setItem('sc_user', resp.data.user);
      mergeSchoologyData(resp.data);
      renderAll();
      btn.className = 'sync-btn ok';
      lbl.textContent = resp.msg || 'Synced';
      clearTimeout(_syncTimeout);
      _syncTimeout = setTimeout(() => { btn.className = 'sync-btn'; checkSyncStatus(); }, 2500);
    } else if (resp.needs_auth) {
      // Token expired — clear and re-auth
      localStorage.removeItem('sc_at');
      localStorage.removeItem('sc_ats');
      btn.className = 'sync-btn err';
      lbl.textContent = 'Re-connect';
      clearTimeout(_syncTimeout);
      _syncTimeout = setTimeout(() => { btn.className = 'sync-btn'; checkSyncStatus(); }, 2500);
    } else {
      btn.className = 'sync-btn err';
      lbl.textContent = resp.error || 'Error';
      clearTimeout(_syncTimeout);
      _syncTimeout = setTimeout(() => { btn.className = 'sync-btn'; checkSyncStatus(); }, 3000);
    }
  })
  .catch(err => {
    spin.style.display = 'none';
    btn.className = 'sync-btn err';
    lbl.textContent = 'Failed';
    clearTimeout(_syncTimeout);
    _syncTimeout = setTimeout(() => { btn.className = 'sync-btn'; checkSyncStatus(); }, 3000);
  });
}

// ============================================================
// UTILS
// ============================================================
function subjectColor(s) { return (DATA.subjects[s]||{color:'#6B7280'}).color; }

function chip(subject) {
  if (!subject) return '';
  return `<span class="chip" style="background:${subjectColor(subject)}" data-filter="${subject}">${subject}</span>`;
}

function timerBadge(durStr, label) {
  const m = durStr.match(/(\d+)/);
  if (!m) return `<span class="badge badge-gray">${durStr}</span>`;
  return `<span class="timer-badge" data-timer="${parseInt(m[1])}|${label||durStr}">${durStr}</span>`;
}

function getTimeMins(str) {
  const m = str.match(/(\d+)(?::(\d+))?\s*(am|pm)/i);
  if (!m) return -1;
  let h=parseInt(m[1]); const min=parseInt(m[2]||'0'); const ap=m[3].toLowerCase();
  if (ap==='pm'&&h!==12) h+=12;
  if (ap==='am'&&h===12) h=0;
  return h*60+min;
}

function formatDate(s) {
  return new Date(s+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}

function getGreeting() {
  const h = new Date().getHours();
  if (h<12) return 'Good morning';
  if (h<17) return 'Good afternoon';
  return 'Good evening';
}

function showTab(name) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  document.getElementById('content').scrollTo(0,0);
}

function dismissAlert(id) {
  const el = document.getElementById('alert-'+id);
  if (!el) return;
  el.classList.add('dismissing');
  setTimeout(()=>el.remove(),280);
  const d = JSON.parse(sessionStorage.getItem('da')||'[]');
  d.push(id); sessionStorage.setItem('da',JSON.stringify(d));
}

// ============================================================
// EVENT DELEGATION
// ============================================================
document.addEventListener('click', e => {
  const tEl = e.target.closest('[data-timer]');
  if (tEl) { const [m,l]=tEl.dataset.timer.split('|'); openTimer(parseInt(m),l); return; }

  const fEl = e.target.closest('[data-filter]');
  if (fEl) { filterSubject(fEl.dataset.filter); return; }

  const dEl = e.target.closest('[data-detail]');
  if (dEl && DETAILS[dEl.dataset.detail]) { const {title,html}=DETAILS[dEl.dataset.detail]; openDetailModal(title,html); return; }

  const tabEl = e.target.closest('[data-tab]');
  if (tabEl) { showTab(tabEl.dataset.tab); return; }

  const planEl = e.target.closest('[data-plan]');
  if (planEl) {
    document.querySelectorAll('.tab-pill').forEach(p=>p.classList.remove('active'));
    planEl.classList.add('active');
    document.getElementById('planStudy').style.display   = planEl.dataset.plan==='study'?'block':'none';
    document.getElementById('planCatchup').style.display = planEl.dataset.plan==='catchup'?'block':'none';
    return;
  }

  if (e.target.closest('#syncBtn'))     { runSync(); return; }
  if (e.target.closest('#addEventBtn')) { openAddEventModal(); return; }
  if (e.target.id==='addEventSaveBtn')  { saveCustomEvent(); return; }
  if (e.target.id==='addEventCloseBtn') { closeModal('addEventModal'); return; }
  if (e.target===document.getElementById('addEventModal')) { closeModal('addEventModal'); return; }

  const guideEl = e.target.closest('[data-guide-idx]');
  if (guideEl) { generateStudyGuide(parseInt(guideEl.dataset.guideIdx), guideEl); return; }
  if (e.target.id==='timerStartBtn')   { timerToggle(); return; }
  if (e.target.id==='timerResetBtn')   { timerReset(); return; }
  if (e.target.id==='timerCloseBtn')   { closeTimer(); return; }
  if (e.target.id==='filterCloseBtn')  { closeModal('filterModal'); return; }
  if (e.target.id==='detailCloseBtn')  { closeModal('detailModal'); return; }


  ['filterModal','detailModal'].forEach(id=>{
    if (e.target===document.getElementById(id)) closeModal(id);
  });
  if (e.target===document.getElementById('timerModal')) closeTimer();

  const gcEl = e.target.closest('[data-grade-idx]');
  if (gcEl) { openGradeDetail(parseInt(gcEl.dataset.gradeIdx)); return; }

  const adEl = e.target.closest('[data-dismiss]');
  if (adEl) { dismissAlert(adEl.dataset.dismiss); return; }
});

function renderToday() {
  const t = DATA.today;
  document.getElementById('greeting').textContent  = getGreeting() + ', ' + DATA.profile.name;
  document.getElementById('todayDate').textContent = formatDate(t.date);
  if (!DATA.meta.calendarConnected) document.getElementById('calNote').style.display='block';

  // Smart focus card (time-aware)
  const sf = computeSmartFocus();
  const _tagDot = `<span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${sf.tagColor};margin-right:5px;vertical-align:middle"></span>`;
  document.getElementById('focusCardWrap').innerHTML = `
    <div class="focus-card">
      <div class="focus-label" style="color:rgba(255,255,255,0.75)">${_tagDot}${sf.tag}</div>
      <div class="focus-title">${sf.title}</div>
      <div class="focus-sub">${sf.note || ''}</div>
      ${sf.duration ? `<div class="focus-duration" data-timer="${sf.duration}|${sf.title}">${sf.duration} min — tap to start timer</div>` : ''}
      ${sf.subject ? `<div style="margin-top:10px">${chip(sf.subject)}</div>` : ''}
    </div>`;
  // Refresh every minute so recommendation stays current
  if (!window._focusRefresher) {
    window._focusRefresher = setInterval(() => {
      const sf2 = computeSmartFocus();
      const _d2 = `<span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${sf2.tagColor};margin-right:5px;vertical-align:middle"></span>`;
      document.getElementById('focusCardWrap').innerHTML = `
        <div class="focus-card">
          <div class="focus-label" style="color:rgba(255,255,255,0.75)">${_d2}${sf2.tag}</div>
          <div class="focus-title">${sf2.title}</div>
          <div class="focus-sub">${sf2.note || ''}</div>
          ${sf2.duration ? `<div class="focus-duration" data-timer="${sf2.duration}|${sf2.title}">${sf2.duration} min — tap to start timer</div>` : ''}
          ${sf2.subject ? `<div style="margin-top:10px">${chip(sf2.subject)}</div>` : ''}
        </div>`;
    }, 60000);
  }

  // Alerts
  const dismissed = JSON.parse(sessionStorage.getItem('da')||'[]');
  let aHtml = '';
  DATA.alerts.filter(a=>!dismissed.includes(a.id)).forEach(a=>{
    aHtml += `<div class="alert-banner ${a.type}" id="alert-${a.id}">
      <div class="alert-text">${a.text}</div>
      <span class="alert-dismiss" data-dismiss="${a.id}">x</span>
    </div>`;
  });
  document.getElementById('alertsWrap').innerHTML = aHtml;

  // Two-column agenda
  renderTodayCols();

  // Due tomorrow (find by date, not label)
  const _todayD = new Date(t.date + 'T12:00:00');
  _todayD.setDate(_todayD.getDate() + 1);
  const _tomorrowStr = _todayD.toISOString().split('T')[0];
  const tom = DATA.week.find(d=>d.date===_tomorrowStr);
  const tomItems = tom ? tom.items.filter(i=>!i.study) : [];
  if (tomItems.length) {
    document.getElementById('dueLabel').textContent = 'Due Tomorrow';
    document.getElementById('dueCard').style.display = 'block';
    let dHtml = '';
    tomItems.forEach(item=>{
      const color=subjectColor(item.subject);
      let did='';
      if (item.detail) did=reg(item.label,`<p style="font-size:13px;line-height:1.65;color:var(--subtext)">${item.detail}</p><div style="margin-top:12px">${chip(item.subject)}${schoologyBtn(item.schoologyUrl)}</div>`);
      dHtml += `<div class="due-item"${did?` data-detail="${did}"`:''}>
        <div style="width:3px;height:34px;background:${color};border-radius:2px;flex-shrink:0"></div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700">${item.label}</div>
          <div style="font-size:11px;color:var(--subtext);margin-top:2px">${item.subject||'—'} · ${item.time}</div>
        </div>
        ${did?'<div style="font-size:14px;color:var(--subtext)">›</div>':''}
      </div>`;
    });
    document.getElementById('dueCard').innerHTML = dHtml;
  } else {
    document.getElementById('dueLabel').textContent = '';
    document.getElementById('dueCard').style.display = 'none';
  }

}

function renderTodayCols() {
  const agenda = DATA.today.agenda;
  const now = new Date();
  const nowMins = now.getHours()*60 + now.getMinutes();
  const nowLabel = `${now.getHours()%12||12}:${String(now.getMinutes()).padStart(2,'0')} ${now.getHours()>=12?'pm':'am'}`;

  // Split into two groups
  const dayEvents  = agenda.filter(a=>a.type==='event'||a.type==='block');
  const studyItems = agenda.filter(a=>a.type==='study'||a.type==='hw');

  function buildColItems(items, colLabel) {
    let html = '';
    let nowInserted = false;

    items.forEach((block, i) => {
      const color  = subjectColor(block.subject);
      const bMins  = getTimeMins(block.start);
      const nMins  = i < items.length-1 ? getTimeMins(items[i+1].start) : bMins+90;
      const isNow  = bMins >= 0 && nowMins >= bMins && nowMins < nMins;

      // Insert time line before this block if now falls before it
      if (!nowInserted && bMins >= 0 && nowMins < bMins) {
        html += `<div class="time-now-line"><div class="time-now-dot"></div><div class="time-now-bar"></div><div class="time-now-label">${nowLabel}</div></div>`;
        nowInserted = true;
      }

      const tagsHtml  = (block.tags||[]).map(tg=>`<span class="badge ${tg.cls}">${tg.label}</span>`).join('');
      const durBadge  = timerBadge(block.duration, block.title);
      const scholBtn  = schoologyBtn(block.schoologyUrl);

      const detailHtml = `<div class="modal-item"><div class="modal-item-title">Time</div><div class="modal-item-sub">${block.start} · ${block.duration}</div></div>
        <div class="modal-item"><div class="modal-item-title">Notes</div><div class="modal-item-sub">${block.note}</div></div>
        ${block.subject?`<div class="modal-item"><div class="modal-item-title">Subject</div><div class="modal-item-sub">${chip(block.subject)}</div></div>`:''}
        <div style="margin-top:10px">${scholBtn}</div>`;
      const did = reg(block.title, detailHtml);

      html += `<div class="col-item${isNow?' col-item-now':''}" style="border-left-color:${isNow?'var(--accent)':color}" data-detail="${did}">
        <div class="col-item-title">${block.title}</div>
        <div class="col-item-time">${block.start}</div>
        <div class="col-item-footer">${chip(block.subject)}${tagsHtml}${durBadge}</div>
        ${scholBtn ? `<div style="margin-top:6px">${scholBtn}</div>` : ''}
      </div>`;

      // Insert time line after this block if now is during it
      if (!nowInserted && isNow) {
        // already highlighted — skip line
        nowInserted = true;
      }
    });

    if (!items.length) {
      html = `<div style="font-size:12px;color:var(--subtext);padding:10px 4px;font-weight:500">Nothing scheduled</div>`;
    }
    return html;
  }

  document.getElementById('todayCols').innerHTML = `

// RENDER WEEK  (day cards with events/study split)
// ============================================================
function renderWeek() {
  const today = DATA.today.date;
  const weeks = getMergedWeek();
  const first = new Date(weeks[0].date+'T12:00:00');
  const last  = new Date(weeks[weeks.length-1].date+'T12:00:00');
  document.getElementById('weekRange').textContent =
    first.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' – ' +
    last.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  let weekHtml = '';
  weeks.forEach(day => {
    const isToday = day.date === today;
    const dayNum  = new Date(day.date+'T12:00:00').getDate();
    const numHtml = isToday ? `<span class="today-num-circle">${dayNum}</span>` : dayNum;

    const events = day.items.filter(i=>!i.study);
    const study  = day.items.filter(i=>i.study);
    const hasBoth = events.length > 0 && study.length > 0;

    let itemsHtml = '';

    if (events.length) {
      itemsHtml += events.map(item=>{
        const color = subjectColor(item.subject);
        let did='';
        if (item.detail||item.schoologyUrl) {
          const dHtml=`<div class="modal-item"><div class="modal-item-title">${item.label}</div><div class="modal-item-sub">${item.detail||''}</div><div style="margin-top:8px">${chip(item.subject)}${schoologyBtn(item.schoologyUrl)}</div></div>`;
          did=reg(item.label,dHtml);
        }
        const attrs = did?`data-detail="${did}"`:item.subject?`data-filter="${item.subject}"`:'';
        return `<div class="day-item" style="border-left-color:${color}" ${attrs} data-study="0">
          ${item.label}
          <div class="day-item-time">${item.time}</div>
        </div>`;
      }).join('');
    }

    if (hasBoth) {
      itemsHtml += `<div class="day-divider"></div><div class="day-section-label">Study</div>`;
    }

    if (study.length) {
      itemsHtml += study.map(item=>{
        const color = subjectColor(item.subject);
        const attrs = item.subject?`data-filter="${item.subject}"`:'';
        return `<div class="day-item day-study-item" style="border-left-color:var(--accent)" ${attrs} data-study="1">
          ${item.label}
          <div class="day-item-time">${item.time}</div>
        </div>`;
      }).join('');
    }

    if (!events.length && !study.length) {
      itemsHtml = `<div style="font-size:9px;color:var(--subtext);text-align:center;padding:8px 0">Free</div>`;
    }

    weekHtml += `<div class="day-col ${isToday?'today':''}">
      <div class="day-header">
        <div class="day-name">${day.day}</div>
        <div class="day-num">${numHtml}</div>
      </div>
      ${itemsHtml}
    </div>`;
  });
  document.getElementById('weekRow').innerHTML = weekHtml;
  // Make each day column's items draggable
  document.querySelectorAll('.day-col').forEach(col => makeDraggableWeekCol(col));

  // Upcoming list (events only)
  let upHtml = '';
  weeks.forEach(day=>{
    day.items.filter(i=>!i.study).forEach(item=>{
      const color=subjectColor(item.subject);
      const ds=new Date(day.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      let did='';
      if (item.detail||item.schoologyUrl) {
        const dHtml=`<div class="modal-item"><div class="modal-item-title">${item.label}</div><div class="modal-item-sub">${item.detail||''}</div><div style="margin-top:8px">${chip(item.subject)}${schoologyBtn(item.schoologyUrl)}</div></div>`;
        did=reg(item.label,dHtml);
      }
      const attrs=did?`data-detail="${did}"`:item.subject?`data-filter="${item.subject}"`:'';
      upHtml += `<div class="upcoming-item" ${attrs}>
        <div style="width:4px;height:36px;background:${color};border-radius:2px;flex-shrink:0"></div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700">${item.label}</div>
          <div style="font-size:11px;color:var(--subtext);margin-top:2px">${item.subject||'—'} · ${ds} at ${item.time}</div>
        </div>
        <div style="font-size:15px;color:var(--subtext)">›</div>
      </div>`;
    });
  });
  document.getElementById('upcomingList').innerHTML = upHtml;
  makeDraggable(document.getElementById('upcomingList'));
}

    items.forEach(item=>{
      const color=subjectColor(item.subject);

// ============================================================
// CUSTOM EVENTS  (localStorage — survives sync task updates)
// ============================================================
function getCustomEvents() {
  try { return JSON.parse(localStorage.getItem('customEvents') || '[]'); } catch(e) { return []; }
}
function saveCustomEvents(arr) {
  localStorage.setItem('customEvents', JSON.stringify(arr));
}

// Merge custom events into DATA.week at render time (non-destructive)
function getMergedWeek() {
  const custom = getCustomEvents();
  // Deep clone week so we don't mutate DATA
  const week = DATA.week.map(d => ({ ...d, items: [...d.items] }));
  custom.forEach(ev => {
    const day = week.find(d => d.date === ev.date);
    if (day) {
      const isStudy = ev.type === 'study';
      day.items.push({
        subject: ev.subject || null,
        label:   ev.title + (ev.custom ? '' : ''),
        time:    ev.timeDisplay,
        study:   isStudy,
        custom:  true,
        note:    ev.note || ''
      });
      // Sort items by time
      day.items.sort((a, b) => {
        const ta = getTimeMins(a.time), tb = getTimeMins(b.time);
        if (ta < 0 && tb < 0) return 0;
        if (ta < 0) return 1;
        if (tb < 0) return -1;
        return ta - tb;
      });
    }
  });
  return week;
}

function openAddEventModal() {
  // Populate date select
  const sel = document.getElementById('evDate');
  sel.innerHTML = '';
  DATA.week.forEach(day => {
    const d = new Date(day.date + 'T12:00:00');
    const label = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    const opt = document.createElement('option');
    opt.value = day.date;
    opt.textContent = label + (day.label === 'Today' ? ' (Today)' : '');
    sel.appendChild(opt);
  });
  // Populate subject select
  const subSel = document.getElementById('evSubject');
  subSel.innerHTML = '<option value="">— none —</option>';
  Object.keys(DATA.subjects).forEach(key => {
    const opt = document.createElement('option');
    opt.value = key; opt.textContent = key + ' — ' + DATA.subjects[key].full;
    subSel.appendChild(opt);
  });
  document.getElementById('evTitle').value = '';
  document.getElementById('evNote').value  = '';
  openModal('addEventModal');
}

function saveCustomEvent() {
  const title = document.getElementById('evTitle').value.trim();
  if (!title) { document.getElementById('evTitle').focus(); return; }
  const date    = document.getElementById('evDate').value;
  const timeVal = document.getElementById('evTime').value;          // "HH:MM"
  const subject = document.getElementById('evSubject').value || null;
  const type    = document.getElementById('evType').value;
  const note    = document.getElementById('evNote').value.trim();

  // Format display time
  const [hh, mm] = timeVal.split(':').map(Number);
  const ampm  = hh >= 12 ? 'pm' : 'am';
  const h12   = hh % 12 || 12;
  const timeDisplay = `${h12}:${String(mm).padStart(2,'0')}${ampm}`;

  const ev = { id: 'ce_' + Date.now(), date, timeVal, timeDisplay, title, subject, type, note, custom: true };
  const arr = getCustomEvents();
  arr.push(ev);
  saveCustomEvents(arr);

  closeModal('addEventModal');
  renderWeek(); // refresh
}

function generateStudyGuide(planIdx, btnEl) {
  const plan = DATA.studyPlan[planIdx];
  if (!plan) return;
  btnEl.classList.add('loading');
  btnEl.textContent = 'Building...';

  setTimeout(() => {
    try {
      const html = buildStudyGuideHTML(plan);
      const blob = new Blob([html], { type: 'text/html' });
      const url  = URL.createObjectURL(blob);
      window.open(url, '_blank');
    } catch(err) {
      console.error(err);
    }
    btnEl.classList.remove('loading');
    btnEl.textContent = 'Generate Study Guide';
  }, 80);
}

// ============================================================
// SMART FOCUS  (time-aware, no past items)
// ============================================================
function computeSmartFocus() {
  const now      = new Date();
  const nowMins  = now.getHours() * 60 + now.getMinutes();
  const agenda   = DATA.today.agenda;

  function durMins(str) {
    const m = (str || '').match(/(\d+)/);
    return m ? parseInt(m[1]) : 45;
  }

  // 1. Something happening RIGHT NOW (event/block only — don't say "do this" if it's happening)
  for (const item of agenda) {
    const start = getTimeMins(item.start);
    if (start < 0) continue;
    const end = start + durMins(item.duration);
    if (nowMins >= start && nowMins < end && (item.type === 'event' || item.type === 'block')) {
      return {
        tag: 'Happening now', tagColor: '#F87171',
        title: item.title, note: item.note,
        subject: item.subject, duration: null
      };
    }
  }

  // 2. Upcoming study/hw items (not past, not too far in future)
  const pendingStudy = agenda
    .filter(a => {
      const m = getTimeMins(a.start);
      return (a.type === 'study' || a.type === 'hw') && (m < 0 || m >= nowMins - 20);
    })
    .sort((a, b) => {
      // Items with explicit upcoming time first, then unscheduled
      const ma = getTimeMins(a.start), mb = getTimeMins(b.start);
      if (ma >= 0 && mb >= 0) return ma - mb;
      if (ma >= 0 && ma <= nowMins + 90) return -1;
      if (mb >= 0 && mb <= nowMins + 90) return 1;
      // MAJOR tags sort before others
      const aM = (a.tags||[]).some(t=>t.label==='MAJOR') ? 0 : 1;
      const bM = (b.tags||[]).some(t=>t.label==='MAJOR') ? 0 : 1;
      return aM - bM;
    });

  // What's the next hard event so we can show free-time context?
  const nextEvent = agenda
    .filter(a => (a.type === 'event' || a.type === 'block') && getTimeMins(a.start) > nowMins + 5)
    .sort((a, b) => getTimeMins(a.start) - getTimeMins(b.start))[0];

  if (pendingStudy.length > 0) {
    const item = pendingStudy[0];
    const startM = getTimeMins(item.start);
    const isMajor = (item.tags||[]).some(t=>t.label==='MAJOR');
    let note = item.note;
    if (nextEvent) {
      const gap = getTimeMins(nextEvent.start) - nowMins;
      if (gap > 0 && gap <= 150) {
        note = gap + ' min free before ' + nextEvent.title + '. ' + item.note;
      }
    }
    const tag = isMajor ? 'MAJOR — do now' : (startM > 0 && startM > nowMins ? 'Coming up ' + item.start : 'Do now');
    return {
      tag, tagColor: isMajor ? '#C4B5FD' : '#818CF8',
      title: item.title, note,
      subject: item.subject, duration: durMins(item.duration)
    };
  }

  // 3. Today's study plan sessions
  for (const plan of DATA.studyPlan) {
    for (const session of plan.sessions) {
      if (session.isToday) {
        return {
          tag: plan.weight === 'MAJOR' ? 'MAJOR — planned' : 'Planned today',
          tagColor: plan.weight === 'MAJOR' ? '#C4B5FD' : '#818CF8',
          title: plan.title, note: session.focus,
          subject: plan.subject, duration: durMins(session.duration)
        };
      }
    }
  }

  // 4. Most urgent upcoming study plan (within 2 days)
  const todayDate = new Date(DATA.today.date + 'T12:00:00');
  const urgentPlan = DATA.studyPlan
    .filter(p => p.sessions.some(s => !s.isToday))
    .sort((a, b) => {
      const wa = a.weight === 'MAJOR' ? 0 : 1;
      const wb = b.weight === 'MAJOR' ? 0 : 1;
      return wa - wb;
    })[0];

  if (urgentPlan) {
    const nextSess = urgentPlan.sessions.find(s => !s.isToday);
    if (nextSess) {
      return {
        tag: 'Coming up — ' + nextSess.day + ' ' + nextSess.date,
        tagColor: '#94A3B8',
        title: urgentPlan.title, note: nextSess.focus,
        subject: urgentPlan.subject, duration: durMins(nextSess.duration)
      };
    }
  }

  // 5. Fallback
  const f = DATA.today.focusTask;
  return { tag: 'Focus', tagColor: '#818CF8', title: f.title, note: f.note, subject: f.subject, duration: f.duration };
}


// ============================================================
// DRAG & DROP  (container-level delegation + nearest-item fallback)
// ============================================================
let _dragSrc = null;
let _dragLastTarget = null; // tracks last valid drop target even when cursor drifts over gaps
const _skipClasses = new Set(['day-header','time-now-line','day-divider','day-section-label','drag-handle']);

// When cursor is over a non-draggable gap (divider, label), snap to nearest item by Y
function _nearestDraggable(container, clientY) {
  const items = [...container.children].filter(el => el.getAttribute('draggable') === 'true');
  let nearest = null, nearestDist = Infinity;
  for (const el of items) {
    const box = el.getBoundingClientRect();
    const center = box.top + box.height / 2;
    const dist = Math.abs(clientY - center);
    if (dist < nearestDist) { nearestDist = dist; nearest = el; }
  }
  return nearest;
}

function makeDraggable(container) {
  if (!container || container._dragReady) return;
  container._dragReady = true;

  // Mark and decorate draggable children
  [...container.children].forEach(item => {
    if ([...item.classList].some(c => _skipClasses.has(c))) return;
    item.setAttribute('draggable', 'true');
    if (!item.querySelector('.drag-handle')) {
      const h = document.createElement('span');
      h.className = 'drag-handle';
      h.setAttribute('aria-hidden', 'true');
      h.textContent = '⠿';
      item.appendChild(h);
    }
  });

  container.addEventListener('dragstart', e => {
    const item = e.target.closest('[draggable="true"]');
    if (!item || item.parentNode !== container) return;
    _dragSrc = item;
    _dragLastTarget = null;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', '');
    setTimeout(() => { if (_dragSrc) _dragSrc.classList.add('drag-dragging'); }, 0);
  });

  container.addEventListener('dragend', () => {
    container.querySelectorAll('.drag-over, .drag-dragging').forEach(el =>
      el.classList.remove('drag-over', 'drag-dragging'));
    _dragSrc = null;
    _dragLastTarget = null;
  });

  container.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    // Try direct hit first, fall back to nearest item
    let target = e.target.closest('[draggable="true"]');
    if (!target || target.parentNode !== container) target = _nearestDraggable(container, e.clientY);
    if (target && target !== _dragSrc) {
      if (_dragLastTarget !== target) {
        container.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        target.classList.add('drag-over');
        _dragLastTarget = target;
      }
    }
  });

  container.addEventListener('dragleave', e => {
    if (!container.contains(e.relatedTarget)) {
      container.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      _dragLastTarget = null;
    }
  });

  container.addEventListener('drop', e => {
    e.preventDefault();
    container.querySelectorAll('.drag-over, .drag-dragging').forEach(el =>
      el.classList.remove('drag-over', 'drag-dragging'));
    if (!_dragSrc) return;
    // Try direct hit, fall back to last tracked target, fall back to nearest
    let target = e.target.closest('[draggable="true"]');
    if (!target || target.parentNode !== container) target = _dragLastTarget;
    if (!target || target.parentNode !== container) target = _nearestDraggable(container, e.clientY);
    if (!target || target === _dragSrc) { _dragSrc = null; _dragLastTarget = null; return; }
    const rect = target.getBoundingClientRect();
    if (e.clientY > rect.top + rect.height / 2) container.insertBefore(_dragSrc, target.nextSibling);
    else container.insertBefore(_dragSrc, target);
    _dragSrc = null;
    _dragLastTarget = null;
  });
}

// ============================================================
// DRAG — WEEK COL  (zone-based: where you drop = what it becomes)
// ============================================================
function makeDraggableWeekCol(container) {
  if (!container || container._dragReady) return;
  container._dragReady = true;

  // Decorate draggable children
  [...container.children].forEach(item => {
    if ([...item.classList].some(c => _skipClasses.has(c))) return;
    item.setAttribute('draggable', 'true');
    if (!item.querySelector('.drag-handle')) {
      const h = document.createElement('span');
      h.className = 'drag-handle'; h.setAttribute('aria-hidden','true'); h.textContent = '⠿';
      item.appendChild(h);
    }
  });

  const isStudyEl = el => el && el.dataset.study === '1';

  // True if cursor Y is in the study zone (below divider, or below all events if no divider)
  function inStudyZone(clientY) {
    const divider = container.querySelector('.day-divider');
    if (divider) return clientY > divider.getBoundingClientRect().bottom;
    const eventItems = [...container.children].filter(
      el => el.getAttribute('draggable') === 'true' && el.dataset.study !== '1');
    if (!eventItems.length) return true;
    return clientY > eventItems[eventItems.length - 1].getBoundingClientRect().bottom - 4;
  }

  // Nearest draggable in a given section (excluding _dragSrc)
  function nearestInSection(clientY, wantStudy) {
    const items = [...container.children].filter(el =>
      el.getAttribute('draggable') === 'true' &&
      el !== _dragSrc &&
      (wantStudy ? el.dataset.study === '1' : el.dataset.study !== '1'));
    if (!items.length) return null;
    let nearest = null, nearestDist = Infinity;
    for (const el of items) {
      const box = el.getBoundingClientRect();
      const dist = Math.abs(clientY - (box.top + box.height / 2));
      if (dist < nearestDist) { nearestDist = dist; nearest = el; }
    }
    return nearest;
  }

  // Make an item a study item, save original color
  function ensureStudy(item) {
    if (item.dataset.study === '1') return;
    item.dataset.origColor = item.style.borderLeftColor;
    item.dataset.study = '1';
    item.classList.add('day-study-item');
    item.style.borderLeftColor = 'var(--accent)';
  }

  // Make an item an event item, restore original color
  function ensureEvent(item) {
    if (item.dataset.study !== '1') return;
    item.dataset.study = '0';
    item.classList.remove('day-study-item');
    item.style.borderLeftColor = item.dataset.origColor || '';
  }

  // Keep divider + label in sync with actual study items
  function syncDivider() {
    const studyItems = [...container.children].filter(
      el => el.getAttribute('draggable') === 'true' && el.dataset.study === '1');
    const existing = container.querySelector('.day-divider');
    const existingLbl = container.querySelector('.day-section-label');

    if (studyItems.length > 0) {
      const firstStudy = studyItems[0];
      if (!existing) {
        const div = document.createElement('div'); div.className = 'day-divider';
        const lbl = document.createElement('div'); lbl.className = 'day-section-label'; lbl.textContent = 'Study';
        container.insertBefore(div, firstStudy);
        container.insertBefore(lbl, firstStudy);
      } else {
        // Move divider + label just before the first study item if needed
        if (existing.nextElementSibling !== existingLbl) container.insertBefore(existingLbl, existing.nextSibling);
        if (existingLbl.nextElementSibling !== firstStudy) container.insertBefore(existingLbl, firstStudy);
        if (existing.nextElementSibling !== existingLbl) container.insertBefore(existing, existingLbl);
      }
    } else {
      existing?.remove();
      existingLbl?.remove();
      container.classList.remove('drag-bottom');
    }
  }

  container.addEventListener('dragstart', e => {
    const item = e.target.closest('[draggable="true"]');
    if (!item || item.parentNode !== container) return;
    _dragSrc = item; _dragLastTarget = null;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', '');
    setTimeout(() => { if (_dragSrc) _dragSrc.classList.add('drag-dragging'); }, 0);
  });

  container.addEventListener('dragend', () => {
    container.querySelectorAll('.drag-over,.drag-dragging').forEach(el =>
      el.classList.remove('drag-over', 'drag-dragging'));
    container.classList.remove('drag-bottom');
    _dragSrc = null; _dragLastTarget = null;
  });

  container.addEventListener('dragover', e => {
    e.preventDefault();
    if (!_dragSrc) return;
    const studyZone = inStudyZone(e.clientY);

    container.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    container.classList.remove('drag-bottom');

    // Count study items excluding the dragged item itself
    const studyCount = [...container.children].filter(
      el => el.getAttribute('draggable') === 'true' && el.dataset.study === '1' && el !== _dragSrc).length;

    if (studyZone && studyCount === 0) {
      // Empty (or will-be-empty) study zone — show bottom indicator
      container.classList.add('drag-bottom');
      _dragLastTarget = '__bottom__';
      return;
    }

    // Find nearest item in the hovered zone
    let target = studyZone
      ? (e.target.closest('[data-study="1"]') || nearestInSection(e.clientY, true))
      : (e.target.closest('[data-study="0"]') || nearestInSection(e.clientY, false));

    if (target && target.parentNode !== container) target = null;
    if (target === _dragSrc) target = null;

    if (target) {
      target.classList.add('drag-over');
      _dragLastTarget = target;
    }
  });

  container.addEventListener('dragleave', e => {
    if (!container.contains(e.relatedTarget)) {
      container.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      container.classList.remove('drag-bottom');
      _dragLastTarget = null;
    }
  });

  container.addEventListener('drop', e => {
    e.preventDefault();
    container.querySelectorAll('.drag-over,.drag-dragging').forEach(el =>
      el.classList.remove('drag-over', 'drag-dragging'));
    container.classList.remove('drag-bottom');
    if (!_dragSrc) return;

    const studyZone = inStudyZone(e.clientY);
    const studyCount = [...container.children].filter(
      el => el.getAttribute('draggable') === 'true' && el.dataset.study === '1' && el !== _dragSrc).length;

    if (_dragLastTarget === '__bottom__' || (studyZone && studyCount === 0)) {
      // Drop into empty study zone — append and type-convert
      container.appendChild(_dragSrc);
      ensureStudy(_dragSrc);
    } else {
      let target = (_dragLastTarget instanceof Element && _dragLastTarget.parentNode === container)
        ? _dragLastTarget
        : (studyZone ? nearestInSection(e.clientY, true) : nearestInSection(e.clientY, false));

      if (target && target !== _dragSrc && target.parentNode === container) {
        const rect = target.getBoundingClientRect();
        if (e.clientY > rect.top + rect.height / 2) container.insertBefore(_dragSrc, target.nextSibling);
        else container.insertBefore(_dragSrc, target);
        // Zone determines type
        if (studyZone) ensureStudy(_dragSrc); else ensureEvent(_dragSrc);
      }
    }

    syncDivider();
    _dragSrc = null; _dragLastTarget = null;
  });
}

  const col=document.querySelector('.day-col.today');
  if (col) col.scrollIntoView({inline:'center',behavior:'smooth'});
},200);

// ─── macOS Native Notification Bridge ────────────────────────────────────────
// When running inside the Study Planner menu bar app, this sends native
// macOS banner notifications via the Swift WKWebView message handler.
// Outside the app (e.g. in Chrome) it silently falls back to the browser
// Notification API or does nothing.

function nativeNotify(title, body) {
  if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.studyNotify) {
    // Running inside the macOS app — use native notifications
    window.webkit.messageHandlers.studyNotify.postMessage({ title: title, body: body });
  } else if ('Notification' in window && Notification.permission === 'granted') {
    // Fallback: browser notification (when opened in Chrome/Safari directly)
    new Notification(title, { body: body, icon: '' });
  }
}

// Check for upcoming items every 5 minutes and notify if something is starting soon
function checkUpcomingNotifications() {
  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();
  if (!DATA || !DATA.today || !DATA.today.agenda) return;

  DATA.today.agenda.forEach(function(item) {
    if (!item.start) return;
    const m = item.start.match(/(\d+):(\d+)(am|pm)/i);
    if (!m) return;
    let h = parseInt(m[1]), mn = parseInt(m[2]);
    const mer = m[3].toLowerCase();
    if (mer === 'pm' && h !== 12) h += 12;
    if (mer === 'am' && h === 12) h = 0;
    const itemMins = h * 60 + mn;
    const diff = itemMins - nowMins;

    // Notify at 10 min and 2 min warnings (only once each via sessionStorage flag)
    [10, 2].forEach(function(threshold) {
      if (diff === threshold) {
        const key = 'notified_' + item.title + '_' + threshold;
        if (!sessionStorage.getItem(key)) {
          sessionStorage.setItem(key, '1');
          const label = diff === 2 ? 'Starting in 2 minutes' : 'Starting in 10 minutes';
          const subject = item.subject ? ' · ' + item.subject : '';
          nativeNotify(item.title + subject, label);
        }
      }
    });
  });
}

setInterval(checkUpcomingNotifications, 60000);
// Also request browser notification permission on first load (fallback path)
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}
</script>
