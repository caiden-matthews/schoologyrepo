[build]
  command = "echo 'No build needed'"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"
  # Supabase credentials — must be set in Netlify environment variables or Site settings
  # Do not commit actual keys here; these are placeholder names
  SUPABASE_PROJECT_URL = ""
  SUPABASE_ANON_KEY = ""
  SUPABASE_SERVICE_KEY = ""

# Clean URLs: /api/auth → /.netlify/functions/auth, etc.
[[redirects]]
  from = "/api/*"
  to   = "/.netlify/functions/:splat"
  status = 200

# Catch-all: serve study.html for all routes (SPA)
[[redirects]]
  from = "/*"
  to   = "/study.html"
  status = 200
